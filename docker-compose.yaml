services:
  ai:
    build: .
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./notebook:/app/notebook
      - ./datas:/app/datas
      # Optional: mount Kaggle credentials for automatic download
      # - ~/.kaggle:/root/.kaggle

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
      - ./datas:/app/datas
    working_dir: /app
    command: ["streamlit", "run", "app/dashboard.py", "--server.address=0.0.0.0", "--server.headless=true"]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.3.2
    volumes:
      - ./mlflow/mlruns:/mlruns
    ports:
      - "5000:5000"
    entrypoint: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns